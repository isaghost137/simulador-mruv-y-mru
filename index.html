<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulador Físico MRU y MRUV</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family:Arial;
    background:#f0f0f0;
    margin:0;
    padding:20px;
    text-align:center;
}

.contenedor{
    background:white;
    max-width:1100px;
    margin:auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.2);
}

button{
    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

#btnIniciar{
    background:#28a745;
    color:white;
}

#btnDetener{
    background:#dc3545;
    color:white;
}

#btnReiniciar{
    background:#007bff;
    color:white;
}

.datos{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:10px;
    margin-top:20px;
}

.card{
    background:#e7f0ff;
    padding:15px;
    border-radius:10px;
    font-size:18px;
}

#estado{
    font-size:28px;
    margin-top:20px;
    font-weight:bold;
}

#animacion{
    width:100%;
    height:120px;
    background:#ddd;
    border-radius:10px;
    position:relative;
    overflow:hidden;
    margin-top:20px;
}

#bola{
    width:50px;
    height:50px;
    background:red;
    border-radius:50%;
    position:absolute;
    top:35px;
    left:0px;
}

.resumen{
    margin-top:30px;
    background:#fff5c4;
    padding:20px;
    border-radius:10px;
    text-align:left;
}

input{
    padding:8px;
    width:100px;
}

</style>

</head>

<body>

<div class="contenedor">

<h1>Simulador Real de MRU y MRUV</h1>

<p>
La aplicación usa sensores reales del celular para detectar movimiento.
</p>

<h2>Datos físicos</h2>

<label>Masa (kg): </label>
<input type="number" id="masa" value="1">

<label>Gravedad:</label>
<input type="checkbox" id="gravedad" checked>

<br><br>

<button id="btnIniciar" onclick="activarSensores()">
Iniciar
</button>

<button id="btnDetener" onclick="detenerSensores()">
Detener
</button>

<button id="btnReiniciar" onclick="reiniciarDatos()">
Reiniciar
</button>

<div id="estado">
Esperando movimiento...
</div>

<div class="datos">

<div class="card" id="x">
X: 0
</div>

<div class="card" id="y">
Y: 0
</div>

<div class="card" id="z">
Z: 0
</div>

<div class="card" id="aceleracion">
Aceleración: 0
</div>

<div class="card" id="velocidad">
Velocidad: 0
</div>

<div class="card" id="posicion">
Posición: 0
</div>

<div class="card" id="fuerza">
Fuerza: 0
</div>

</div>

<div id="animacion">
<div id="bola"></div>
</div>

<canvas id="graficaPosicion"></canvas>

<canvas id="graficaVelocidad"></canvas>

<div class="resumen">

<h2>Resultado Final</h2>

<div id="resultadoFinal">

Aún no hay resultados.

</div>

</div>

</div>

<script>

let escuchando = false;

let velocidad = 0;
let posicion = 0;

let tiempoInicio = 0;
let tiempoFinal = 0;

let tiempoAnterior = null;

let listenerMovimiento = null;

let aceleraciones = [];

let datosTiempo = [];
let datosPosicion = [];
let datosVelocidad = [];

const bola = document.getElementById("bola");

const graficaPosicion = new Chart(
    document.getElementById("graficaPosicion"),
    {
        type:'line',
        data:{
            labels:datosTiempo,
            datasets:[{
                label:'Posición vs Tiempo',
                data:datosPosicion
            }]
        }
    }
);

const graficaVelocidad = new Chart(
    document.getElementById("graficaVelocidad"),
    {
        type:'line',
        data:{
            labels:datosTiempo,
            datasets:[{
                label:'Velocidad vs Tiempo',
                data:datosVelocidad
            }]
        }
    }
);

function activarSensores(){

    if(escuchando){
        return;
    }

    tiempoInicio = Date.now();

    if(typeof DeviceMotionEvent.requestPermission === 'function'){

        DeviceMotionEvent.requestPermission()
        .then(permissionState => {

            if(permissionState === 'granted'){

                iniciarSensores();

            }

        });

    }else{

        iniciarSensores();

    }

}

function iniciarSensores(){

    escuchando = true;

    listenerMovimiento = function(event){

        let usarGravedad =
            document.getElementById("gravedad").checked;

        let x;
        let y;
        let z;

        if(usarGravedad){

            x = event.accelerationIncludingGravity.x || 0;
            y = event.accelerationIncludingGravity.y || 0;
            z = event.accelerationIncludingGravity.z || 0;

        }else{

            x = event.acceleration.x || 0;
            y = event.acceleration.y || 0;
            z = event.acceleration.z || 0;

        }

        let aceleracionTotal =
            Math.sqrt(x*x + y*y + z*z);

        aceleraciones.push(aceleracionTotal);

        document.getElementById("x").innerHTML =
            "X: " + x.toFixed(2);

        document.getElementById("y").innerHTML =
            "Y: " + y.toFixed(2);

        document.getElementById("z").innerHTML =
            "Z: " + z.toFixed(2);

        document.getElementById("aceleracion").innerHTML =
            "Aceleración: " + aceleracionTotal.toFixed(2);

        let tiempoActual = Date.now();

        if(tiempoAnterior != null){

            let dt =
                (tiempoActual - tiempoAnterior)/1000;

            velocidad += aceleracionTotal * dt;

            posicion += velocidad * dt;

        }

        tiempoAnterior = tiempoActual;

        document.getElementById("velocidad").innerHTML =
            "Velocidad: " + velocidad.toFixed(2);

        document.getElementById("posicion").innerHTML =
            "Posición: " + posicion.toFixed(2);

        let masa =
            parseFloat(
                document.getElementById("masa").value
            );

        let fuerza =
            masa * aceleracionTotal;

        document.getElementById("fuerza").innerHTML =
            "Fuerza: " + fuerza.toFixed(2) + " N";

        let tipoMovimiento;

        if(aceleracionTotal < 1){

            tipoMovimiento = "MRU";

        }else{

            tipoMovimiento = "MRUV";

        }

        document.getElementById("estado").innerHTML =
            "Movimiento Detectado: " + tipoMovimiento;

        let nuevaPosicion =
            posicion * 8;

        if(nuevaPosicion > 900){

            nuevaPosicion = 0;
            posicion = 0;

        }

        bola.style.left =
            nuevaPosicion + "px";

        datosTiempo.push(
            datosTiempo.length
        );

        datosPosicion.push(
            posicion.toFixed(2)
        );

        datosVelocidad.push(
            velocidad.toFixed(2)
        );

        graficaPosicion.update();

        graficaVelocidad.update();

    };

    window.addEventListener(
        'devicemotion',
        listenerMovimiento
    );

}

function detenerSensores(){

    if(listenerMovimiento != null){

        window.removeEventListener(
            'devicemotion',
            listenerMovimiento
        );

    }

    escuchando = false;

    tiempoFinal = Date.now();

    let tiempoTotal =
        (tiempoFinal - tiempoInicio)/1000;

    let suma = 0;

    for(let i=0; i<aceleraciones.length; i++){

        suma += aceleraciones[i];

    }

    let promedio =
        suma / aceleraciones.length;

    let resultado;

    if(promedio < 1){

        resultado = "MRU";

    }else{

        resultado = "MRUV";

    }

    document.getElementById("resultadoFinal").innerHTML =

    "<h3>Resultados Finales</h3>" +

    "<p><b>Tipo de Movimiento:</b> "
    + resultado + "</p>" +

    "<p><b>Tiempo Total:</b> "
    + tiempoTotal.toFixed(2) + " s</p>" +

    "<p><b>Velocidad Final:</b> "
    + velocidad.toFixed(2) + " m/s</p>" +

    "<p><b>Posición Final:</b> "
    + posicion.toFixed(2) + " m</p>" +

    "<p><b>Aceleración Promedio:</b> "
    + promedio.toFixed(2) + " m/s²</p>" +

    "<p><b>Interpretación Física:</b><br>" +

    "Si la aceleración promedio fue cercana a cero, " +
    "el movimiento se considera MRU porque la velocidad " +
    "se mantuvo aproximadamente constante.<br><br>" +

    "Si la aceleración promedio fue distinta de cero, " +
    "el sistema detecta MRUV porque la velocidad cambió " +
    "durante el tiempo del movimiento." +

    "</p>";

}

function reiniciarDatos(){

    velocidad = 0;
    posicion = 0;

    aceleraciones = [];

    datosTiempo = [];
    datosPosicion = [];
    datosVelocidad = [];

    graficaPosicion.data.labels = [];
    graficaPosicion.data.datasets[0].data = [];

    graficaVelocidad.data.labels = [];
    graficaVelocidad.data.datasets[0].data = [];

    graficaPosicion.update();
    graficaVelocidad.update();

    bola.style.left = "0px";

    document.getElementById("resultadoFinal").innerHTML =
        "Datos reiniciados.";

    document.getElementById("estado").innerHTML =
        "Esperando movimiento...";

}

</script>

</body>

</html>
