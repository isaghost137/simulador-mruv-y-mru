<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador MRU y MRUV</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
        text-align: center;
    }

    h1 {
        color: #222;
    }

    .contenedor {
        max-width: 900px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
    }

    .datos {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 10px;
        margin-top: 20px;
    }

    .card {
        background: #e9f0ff;
        padding: 15px;
        border-radius: 10px;
        font-size: 18px;
    }

    #estado {
        font-size: 28px;
        margin-top: 20px;
        font-weight: bold;
    }

    canvas {
        margin-top: 30px;
        background: white;
        border-radius: 10px;
    }

    button {
        padding: 15px 25px;
        border: none;
        background: #007bff;
        color: white;
        font-size: 18px;
        border-radius: 10px;
        cursor: pointer;
        margin-top: 20px;
    }

    button:hover {
        background: #0056b3;
    }

    #animacion {
        width: 100%;
        height: 120px;
        background: #ddd;
        border-radius: 10px;
        margin-top: 30px;
        position: relative;
        overflow: hidden;
    }

    #bola {
        width: 50px;
        height: 50px;
        background: red;
        border-radius: 50%;
        position: absolute;
        top: 35px;
        left: 0px;
    }
</style>
</head>
<body>

<div class="contenedor">

    <h1>Simulador MRU y MRUV</h1>

    <p>
        Mueve tu iPhone o Android para detectar el movimiento usando el acelerómetro.
    </p>

    <button onclick="activarSensores()">
        Activar Sensores
    </button>

    <div id="estado">
        Esperando movimiento...
    </div>

    <div class="datos">
        <div class="card" id="x">X: 0</div>
        <div class="card" id="y">Y: 0</div>
        <div class="card" id="z">Z: 0</div>
        <div class="card" id="total">Aceleración Total: 0</div>
        <div class="card" id="velocidad">Velocidad estimada: 0</div>
    </div>

    <div id="animacion">
        <div id="bola"></div>
    </div>

    <canvas id="graficaPosicion"></canvas>
    <canvas id="graficaVelocidad"></canvas>

</div>

<script>

let datosTiempo = [];
let datosPosicion = [];
let datosVelocidad = [];

let tiempo = 0;
let velocidad = 0;
let posicion = 0;

const bola = document.getElementById("bola");

const graficaPosicion = new Chart(
    document.getElementById('graficaPosicion'),
    {
        type: 'line',
        data: {
            labels: datosTiempo,
            datasets: [{
                label: 'Posición vs Tiempo',
                data: datosPosicion
            }]
        }
    }
);

const graficaVelocidad = new Chart(
    document.getElementById('graficaVelocidad'),
    {
        type: 'line',
        data: {
            labels: datosTiempo,
            datasets: [{
                label: 'Velocidad vs Tiempo',
                data: datosVelocidad
            }]
        }
    }
);

function activarSensores() {

    if (typeof DeviceMotionEvent.requestPermission === 'function') {

        DeviceMotionEvent.requestPermission()
            .then(permissionState => {

                if (permissionState === 'granted') {
                    iniciarSensores();
                }

            })
            .catch(console.error);

    } else {

        iniciarSensores();

    }
}

function iniciarSensores() {

    window.addEventListener('devicemotion', function(event) {

        let x = event.accelerationIncludingGravity.x || 0;
        let y = event.accelerationIncludingGravity.y || 0;
        let z = event.accelerationIncludingGravity.z || 0;

        let total = Math.sqrt(x*x + y*y + z*z);

        document.getElementById("x").innerHTML = "X: " + x.toFixed(2);
        document.getElementById("y").innerHTML = "Y: " + y.toFixed(2);
        document.getElementById("z").innerHTML = "Z: " + z.toFixed(2);
        document.getElementById("total").innerHTML =
            "Aceleración Total: " + total.toFixed(2);

        velocidad += total * 0.02;
        posicion += velocidad * 0.02;

        document.getElementById("velocidad").innerHTML =
            "Velocidad estimada: " + velocidad.toFixed(2);

        tiempo += 0.02;

        datosTiempo.push(tiempo.toFixed(1));
        datosPosicion.push(posicion.toFixed(2));
        datosVelocidad.push(velocidad.toFixed(2));

        graficaPosicion.update();
        graficaVelocidad.update();

        let movimiento;

        if (total < 11) {
            movimiento = "MRU";
        } else {
            movimiento = "MRUV";
        }

        document.getElementById("estado").innerHTML =
            "Movimiento detectado: " + movimiento;

        let nuevaPosicion = posicion * 5;

        if (nuevaPosicion > 800) {
            nuevaPosicion = 0;
            posicion = 0;
        }

        bola.style.left = nuevaPosicion + "px";

    });
}

</script>

</body>
</html>
